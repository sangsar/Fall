<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فال حافظ | Samisaki</title>
    <style>
        :root {
            --bg: #0a0a0c;
            --gold: #D4AF37;
            --gold-light: #FEF0C0;
            --card-bg: rgba(15, 15, 20, 0.9);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            font-family: 'Tahoma', 'Georgia', serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            direction: rtl;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }
        .stars-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 0;
        }
        .star {
            position: absolute;
            clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
            background: var(--gold);
            box-shadow: 0 0 12px var(--gold), 0 0 25px rgba(212,175,55,0.8);
            animation: twinkle 4s infinite ease-in-out;
            opacity: 0.8;
        }
        @keyframes twinkle {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.5); }
        }
        .music-toggle {
            position: fixed; top: 20px; right: 20px; z-index: 999;
            background: var(--gold); border: none;
            color: #0a0a0c; width: 38px; height: 38px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-size: 1.2rem;
            box-shadow: 0 0 15px rgba(212,175,55,0.6);
            transition: 0.3s;
        }
        .music-toggle:hover {
            box-shadow: 0 0 25px var(--gold);
            transform: scale(1.1);
        }
        .card {
            position: relative; z-index: 1;
            background: var(--card-bg); backdrop-filter: blur(20px);
            border: 1px solid rgba(212,175,55,0.4); border-radius: 36px;
            padding: 50px 30px 40px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.7), 0 0 40px rgba(212,175,55,0.3);
            text-align: center; max-width: 650px; width: 100%;
            display: flex; flex-direction: column; align-items: center; gap: 35px;
        }
        .title {
            font-size: 2.8rem; color: var(--gold);
            text-shadow: 0 0 20px rgba(212,175,55,0.5); letter-spacing: 2px; font-weight: bold;
        }
        .btn-group {
            display: flex; flex-direction: column; align-items: center; gap: 18px; width: 100%;
        }
        .btn {
            background: radial-gradient(circle at 20% 30%, #f9e4b7, #b68b40);
            border: 2px solid #7a5c32;
            color: #1a1a1a;
            font-family: 'Tahoma', 'Georgia', serif;
            font-weight: bold;
            font-size: 1.2rem;
            padding: 14px 20px;
            border-radius: 20px 5px 20px 5px;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 85%;
            max-width: 350px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.6), inset 0 1px 2px rgba(255,255,255,0.3);
            letter-spacing: 0.5px;
            position: relative;
            overflow: hidden;
        }
        .btn::before {
            content: "";
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: transform 0.4s;
            transform: translateX(-100%);
        }
        .btn:hover {
            background: radial-gradient(circle at 30% 40%, #c89840, #7a5020);
            color: #fff;
            box-shadow: 0 0 25px rgba(212,175,55,0.8);
            transform: translateY(-3px);
            border-color: var(--gold-light);
        }
        .btn:hover::before { transform: translateX(100%); }
        .btn:active { transform: scale(0.96); }
        .suggestion { font-size: 1.6rem; color: var(--gold-light); margin: 20px 0; min-height: 60px; }
        .poem-text {
            font-size: 1.3rem;
            font-weight: 400; line-height: 2.2;
            color: var(--gold-light);
            text-shadow: 0 0 8px rgba(212,175,55,0.3);
            white-space: pre-line;
        }
        .meaning-text { font-size: 1.1rem; color: #ccc; line-height: 2; border-top: 1px solid rgba(212,175,55,0.4); padding-top: 20px; margin-top: 10px; }
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(10px);
            z-index: 100; display: none; justify-content: center; align-items: center;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: var(--card-bg); border: 1px solid var(--gold);
            border-radius: 24px; padding: 30px; max-width: 500px; width: 90%;
            max-height: 80vh; overflow-y: auto; color: var(--gold-light);
            text-align: center;
        }
        .modal-content h3 { color: var(--gold); margin-bottom: 20px; }
        .history-item {
            border-bottom: 1px solid rgba(255,255,255,0.1); padding: 15px 0;
            cursor: pointer; transition: background 0.2s;
        }
        .history-item:hover { background: rgba(255,255,255,0.05); }
        .close-btn { margin-top: 20px; }
    </style>
</head>
<body>
<div class="stars-container" id="starsContainer"></div>
<button class="music-toggle" id="musicToggle">🔊</button>
<div class="card" id="mainCard">
    <div class="title">📜 فال حافظ</div>
    <div id="step1"><div class="btn-group"><button class="btn" id="newFalBtn">✨ فال جدید</button><button class="btn" id="historyBtn">📋 فال‌های گذشته</button></div></div>
    <div id="step2" style="display:none;"><div class="suggestion">فال خود را انتخاب کنید:</div><div class="btn-group"><button class="btn" id="romanticBtn">💖 عاشقانه</button><button class="btn" id="dailyBtn">🌿 روزمره</button><button class="btn" id="backBtn1">🔙 بازگشت</button></div></div>
    <div id="step3" style="display:none;"><div class="suggestion" id="verseHint">✨ نیت کنید و ضربه بزنید</div><div class="btn-group"><button class="btn" id="revealBtn">✨ نیت کردم</button><button class="btn" id="backBtn2">🔙 بازگشت</button></div></div>
    <div id="step4" style="display:none;"><div class="poem-text" id="poemDisplay"></div><div class="meaning-text" id="meaningDisplay"></div><div class="btn-group"><button class="btn" id="newSearchBtn">🔄 فال دوباره</button><button class="btn" id="homeBtn">🏠 خانه</button></div></div>
</div>
<div class="modal" id="historyModal"><div class="modal-content"><h3>📜 فال‌های گذشته</h3><div id="historyList"></div><button class="btn close-btn" id="closeModalBtn">بستن</button></div></div>
<div class="modal" id="detailModal"><div class="modal-content"><h3>📜 فال شما</h3><div class="poem-text" id="detailPoem"></div><div class="meaning-text" id="detailMeaning"></div><button class="btn close-btn" id="closeDetailBtn">بستن</button></div></div>
<audio id="bgMusic" loop><source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg"></audio>
<script>
    const poems = [
        { verse: "دوش دیدم که ملائک در میخانه زدند\nگل آدم بسرشتند و به پیمانه زدند\nساقیا می ده که در میکده رندان همه\nجز به عشق تو ندارند سر سجاده زدند\nبلبل از فیض گل آموخت سخن ور نه نبود\nاین همه قندیل سخن که به پروانه زدند\nیوسف گمشده بازآید به کنعان غم مخور\nکلبه احزان شود روزی گلستان غم مخور", meaning: "فال شما از تحولی بزرگ در عشق خبر می‌دهد. فرشتگان گویی عشق را با سرشت انسان آمیخته‌اند. به زودی فرصتی ناب برای ابراز احساسات پیش می‌آید.", category: "romantic" },
        { verse: "رسید مژده که ایام غم نخواهد ماند\nچنان نماند و چنین نیز هم نخواهد ماند\nنفس باد صبا مشک فشان خواهد شد\nعالم پیر دگر باره جوان خواهد شد\nبلبل از شوق گل افسانه‌ها می‌خواند\nکه زمستان برود باغ خزان نخواهد ماند\nتو مرا گو که چه شد یار و چه شد دلبر ما\nکه چنین سوخته و زار و نوان خواهد ماند", meaning: "فال شما بشارت‌دهندهٔ پایان دوران سخت است. نسیم تغییر، جهان وجودتان را دوباره جوان می‌کند. آن دلبر دور شده بازخواهد گشت.", category: "romantic" },
        { verse: "ای پادشه خوبان داد از غم تنهایی\nدل بی تو به جان آمد وقت است که بازآیی\nدایم گل این بستان شاداب نمی‌ماند\nدریاب ضعیفان را در وقت توانایی\nصد باد صبا اینجا با سلسله می‌رقصند\nاین است حریف من تا صبح که بنمایی\nای دوست دل حافظ با درد همی‌سازد\nیا رب برسان یاری کز درد رهاش سازد", meaning: "فال شما از دلتنگی عمیق خبر می‌دهد. معشوق در حال بازگشت است. بادهای صبا گیسوان یار را به رقص درآورده‌اند و این نشانهٔ وصال نزدیک است.", category: "romantic" },
        { verse: "بیا که قصر امل سخت سست بنیاد است\nبیار باده که بنیاد عمر بر باد است\nغلام همت آنم که زیر چرخ کبود\nز هر چه رنگ تعلق پذیرد آزاد است\nبه نقد عمر غنیمت شمر که این سرمایه\nچو برق در گذرد، لحظه‌ای و ناچیز است\nحدیث عشق ز دفتر بخوان که این افسانه\nبرای خاطر ما قصه‌ای دل‌انگیز است", meaning: "فال شما به ناپایداری آرزوها و ارزش لحظات حال اشاره دارد. آزادگی پیشه کنید و از تعلقات رها شوید. از عشق لذت ببرید که این افسانه دل‌انگیز است.", category: "romantic" },
        { verse: "وفا کنیم و ملامت کشیم و خوش باشیم\nکه در طریقت ما کافری است رنجیدن\nبه تیغ و طعن رقیبان چه باکمان آن به\nکه پیش اهل محبت همینم و بس\nبسوخت حافظ و در شرط عشقبازی او\nهنوز بر سر عهد و وفای خویش است\nمکن که پشت کند دوست از تو بر داغی\nکه دوست به ز دو صد دشمن و صد کس باشد", meaning: "فال شما به ارزش وفاداری در عشق اشاره دارد. ملامت دیگران را بپذیرید و شاد باشید. یک دوست بهتر از صد دشمن است.", category: "romantic" },
        { verse: "مرده بودم زنده شدم گریه بودم خنده شدم\nدولت عشق آمد و من دولت پاینده شدم\nدوش دیوانه شدم عشق مرا دید و بگفت\nآمدم نعره مزن جامه مدر هیچ مگو\nگفتم ای عشق من از چیز دگر می‌ترسم\nگفت آن چیز دگر نیست دگر هیچ مگو\nمن به گوش تو سخن‌های نهان خواهم گفت\nسر بجنبان که بلی جز که به سر هیچ مگو", meaning: "فال شما از تولدی دوباره در پرتو عشق خبر می‌دهد. عشق معجزه‌آسا وارد می‌شود و شما را از مرگ به زندگی می‌رساند.", category: "romantic" },
        { verse: "صبا وقت سحر بویی ز زلف یار می‌آورد\nدل شوریده ما را به بو در کار می‌آورد\nمن آن شکل صنوبر را ز باغ دیده برکندم\nکه هر گل کز غمش بشکفت محنت بار می‌آورد\nفروغ ماه می‌دیدم ز بام قصر او روشن\nکه رو از شرم آن خورشید در دیوار می‌آورد\nز بیم غارت عشقش دل پرخون رها کردم\nولی می‌ریخت خون و رحم بر این کار می‌آورد", meaning: "فال شما از رسیدن خبری خوش از سوی معشوق حکایت دارد. نسیم سحرگاهی عطر یار را می‌آورد. از عشق نترسید که این بار رحم و شفقت در راه است.", category: "romantic" },
        { verse: "دلم رمیده شد و غافلم من درویش\nکه آن شکاری سرگشته را چه آمد پیش\nبه ناز و غمزه چه حاجت که دل ز ما ببری\nتو خود ز هر نگهی دلبری و غارتگر\nمن از کجا و غم عشق از کجا و این دل زار\nکه در قفس نتوان داشت طایران را\nمده فریبم و گویم که دل ز مهر بشوی\nکه مهر پاک نیاید برون ز طبع بشر", meaning: "فال شما از آشفتگی و سرگشتگی در عشق خبر می‌دهد. نمی‌توان دل را در قفس نگه داشت. عشق طبع بشر است.", category: "romantic" },
        { verse: "فریاد که آن ساقی شکرلب سرمست\nدانست که من باده پرستم نپرستید\nدر میکده رندان همه در حال پرستش\nمن در طلب ساقی و او مست نپرستید\nهر ناله که از دل برود بر سر کویش\nدانم که ز دل می‌رود و باز نیاید\nگر باده خوری با من ای دوست بگو تا\nکاین دین و خرد را همگی در سرت آید", meaning: "فال شما از عشقی بی‌پاسخ حکایت دارد. گاهی باید رها کنید. اگر کسی قدر شما را نداند، ارزش رنج کشیدن ندارد.", category: "romantic" },
        { verse: "مژده ای دل که دگر باره بهار آمد و خوش\nسبزه‌ها رست و گل و سنبل و ریحان آمد\nنوبهار آمد و آورد گل و یاسمنا\nباغبانا ز چه رو باغ چو خلدت زینا\nباد نوروز وزیدن ز سر زلف نگار\nکه ز فیضش همه عالم شود از سر برنا\nای گل خوشبوی اگر چند ز ما دور شوی\nهمه جا بوی تو دارم که صبا عنبرسا", meaning: "فال شما از فرا رسیدن بهاری روح‌نواز در عشق خبر می‌دهد. شخصی مانند نسیم وارد زندگی‌تان می‌شود.", category: "romantic" },
        { verse: "ای فروغ ماه حسن از روی رخشان شما\nآب روی خوبی از چاه زنخدان شما\nعزم دیدار تو دارد جان بر لب آمده\nبازگردد یا برآید چیست فرمان شما\nکس به دور نرگست طرفی نبست از عافیت\nبه که نفروشند مستوری به مستان شما\nای نسیم صبحگاهی آگهی از یار کو\nکز غم هجران شما شد دیدهٔ ما خون شما", meaning: "فال شما از جذابیت خیره‌کنندهٔ معشوقی سخن می‌گوید. دلتان برای دیدار او پر می‌زند.", category: "romantic" },
        { verse: "نفس باد صبا مشک فشان خواهد شد\nعالم پیر دگر باره جوان خواهد شد\nارغوان جام عقیقی به سمن خواهد داد\nچشم نرگس به شقایق نگران خواهد شد\nاین تطاول که کشید از غم هجران بلبل\nتا سراپرده گل نعره‌زنان خواهد شد\nمژده ای دل که دگر باره بهار عشق آمد\nتا ز فیضش همه عالم گل و ریحان خواهد شد", meaning: "فال شما از تحولی بزرگ و تجدید حیات در عشق خبر می‌دهد. جهان پیر وجودتان دوباره جوان می‌شود.", category: "romantic" },
        { verse: "ای شمع مجلس افروز از پرتو رخت\nدلهای ما بسوخت و تو بی‌اعتنا شدی\nرفتی و رفتنت ز دل ما نمی‌رود\nبرگشتی و بازآمدنت آرزوی ماست\nگفتم که بنالم چو ز هجران تو ای دوست\nگفتا که بنال ار چه ز هجران بنالی\nحافظ ز فراق تو چه نالد چه بنالد\nچون نیست کس او را که به فریاد رسدش", meaning: "فال شما از عشقی بی‌پاسخ و سوزناک حکایت دارد. اما ناامید نشوید. به زودی کسی پیدا می‌شود که به فریادتان برسد.", category: "romantic" },
        { verse: "بیا که قصر امل سخت سست بنیاد است\nبیار باده که بنیاد عمر بر باد است\nغلام همت آنم که زیر چرخ کبود\nز هر چه رنگ تعلق پذیرد آزاد است\nبه می سجاده رنگین کن گرت پیر مغان گوید\nکه سالک بی‌خبر نبود ز راه و رسم منزلها\nبه بوی نافه‌ای کآخر صبا زان طره بگشاید\nز تاب جعد مشکینش چه خون افتاد در دلها", meaning: "فال شما به ناپایداری آرزوها و ضرورت رهایی از تعلقات اشاره دارد. نسیمی به زودی گره از کارتان می‌گشاید.", category: "romantic" },
        { verse: "سینه‌ام را گنج پنهان کردی ای دوست\nدر دلم شوقی که می‌خواند مرا سوی تو\nدوش در خواب دیدم روی خوبت را\nکه ز هجرت گشته بودم بی‌سر و بی‌سامان\nچو برخاستم از خواب، دلم می‌کوفت\nکه مگر باز بینم آن رخ رخشان را\nبگشا پردهٔ راز، ای نگار زیبا\nکه دلم طاقت این هجر ندارد، بازآ", meaning: "فال شما از عشقی عمیق و پنهان حکایت دارد. به زودی فرصتی برای وصال پیش می‌آید.", category: "romantic" },
        { verse: "یوسف گمگشته بازآید به کنعان غم مخور\nکلبه احزان شود روزی گلستان غم مخور\nای دل غمدیده حالت به شود دل بد مکن\nوین سر شوریده باز آید به سامان غم مخور\nگر بهار عمر باشد باز بر تخت چمن\nچتر گل در سر کشی ای مرغ خوشخوان غم مخور\nدور گردون گر دو روزی بر مراد ما نرفت\nدایماً یکسان نباشد حال دوران غم مخور", meaning: "فال شما بشارت‌دهندهٔ پایان دوران سخت و بازگشت شادی است. بهار عمرتان فرا می‌رسد.", category: "romantic" },
        { verse: "به کوی عشق تو من عاقلانه می‌رفتم\nکنون از آن ره بی‌باک و بی‌پناه شدم\nچه کردی ای فلک بی‌رحم با دل زارم\nکه از جفای تو من بی‌دل و گناه شدم\nبه پیشگاه تو ای دلبر وفادارم\nچنان شدم که ز خود نیز بی‌خبر باشم\nاگرچه از غم عشقت پریش گشته‌ام، باز\nهنوز بر سر عهد و وفای خویش باشم", meaning: "فال شما از عشقی پرمخاطره می‌گوید. بر سر عهد خود هستید. به زودی پاداش این استقامت را می‌گیرید.", category: "romantic" },

    let currentCategory = null;
    let history = JSON.parse(localStorage.getItem('falHistory')) || [];
    function showStep(s) {
        ['step1','step2','step3','step4'].forEach(id => document.getElementById(id).style.display = 'none');
        document.getElementById('step'+s).style.display = 'block';
    }
    document.getElementById('newFalBtn').addEventListener('click', ()=> showStep(2));
    document.getElementById('backBtn1').addEventListener('click', ()=> showStep(1));
    document.getElementById('backBtn2').addEventListener('click', ()=> showStep(2));
    document.getElementById('homeBtn').addEventListener('click', ()=> showStep(1));
    document.getElementById('newSearchBtn').addEventListener('click', ()=> showStep(1));
    function getRandomPoem(c) { const f = poems.filter(p => p.category === c); return f[Math.floor(Math.random() * f.length)]; }
    document.getElementById('romanticBtn').addEventListener('click', ()=>{
        currentCategory = 'romantic';
        const r = getRandomPoem('romantic');
        document.getElementById('verseHint').textContent = '✨ نیت کنید و ضربه بزنید';
        document.getElementById('verseHint').dataset.poem = r.verse;
        document.getElementById('verseHint').dataset.meaning = r.meaning;
        showStep(3);
    });
    document.getElementById('dailyBtn').addEventListener('click', ()=>{
        currentCategory = 'daily';
        const r = getRandomPoem('daily');
        document.getElementById('verseHint').textContent = '🌿 نیت کنید و ضربه بزنید';
        document.getElementById('verseHint').dataset.poem = r.verse;
        document.getElementById('verseHint').dataset.meaning = r.meaning;
        showStep(3);
    });
    document.getElementById('revealBtn').addEventListener('click', ()=>{
        const p = document.getElementById('verseHint').dataset.poem;
        const m = document.getElementById('verseHint').dataset.meaning;
        document.getElementById('poemDisplay').textContent = p;
        document.getElementById('meaningDisplay').textContent = m;
        history.push({ poem: p, meaning: m, category: currentCategory, date: new Date().toLocaleDateString('fa-IR') });
        localStorage.setItem('falHistory', JSON.stringify(history));
        showStep(4);
    });
    document.getElementById('historyBtn').addEventListener('click', ()=>{
        const list = document.getElementById('historyList');
        list.innerHTML = history.length === 0 ? '<p>هنوز فالی نگرفته‌اید.</p>' : history.map((item, idx) => `<div class="history-item" data-index="${idx}"><strong>فال ${idx+1}:</strong> ${item.poem.split('\n')[0]}...<br><small>${item.date}</small></div>`).join('');
        document.querySelectorAll('.history-item').forEach(el => {
            el.addEventListener('click', function() {
                const fal = history[this.dataset.index];
                document.getElementById('detailPoem').textContent = fal.poem;
                document.getElementById('detailMeaning').textContent = fal.meaning;
                document.getElementById('detailModal').classList.add('active');
            });
        });
        document.getElementById('historyModal').classList.add('active');
    });
    document.getElementById('closeModalBtn').addEventListener('click', ()=> document.getElementById('historyModal').classList.remove('active'));
    document.getElementById('closeDetailBtn').addEventListener('click', ()=> document.getElementById('detailModal').classList.remove('active'));
    const bgMusic = document.getElementById('bgMusic');
    const musicToggle = document.getElementById('musicToggle');
    bgMusic.volume = 0.3;
    let musicPlaying = false;
    musicToggle.addEventListener('click', () => {
        musicPlaying ? (bgMusic.pause(), musicToggle.textContent = '🔇') : (bgMusic.play().catch(()=>{}), musicToggle.textContent = '🔊');
        musicPlaying = !musicPlaying;
    });
    const starsContainer = document.getElementById('starsContainer');
    for (let i=0; i<30; i++) {
        const star = document.createElement('div');
        star.className = 'star';
        const size = Math.random()*5+3;
        star.style.width = size+'px'; star.style.height = size+'px';
        star.style.top = Math.random()*100+'%'; star.style.left = Math.random()*100+'%';
        star.style.animationDelay = Math.random()*4+'s';
        starsContainer.appendChild(star);
    }
    showStep(1);
</script>
</body>
</html>
