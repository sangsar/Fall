<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <title>تست اشعار</title>
</head>
<body style="background:#0a0a0c; color:#D4AF37; text-align:center; padding-top:50px;">
    <h1>در حال تست...</h1>
    <div id="result"></div>
    <script src="poems/poems.js"></script>
    <script>
        if (typeof poems !== 'undefined' && poems.length > 0) {
            document.getElementById('result').innerHTML = 
                '✅ تعداد اشعار: ' + poems.length + '<br>نمونه: ' + poems[0].verse.split('\n')[0];
        } else {
            document.getElementById('result').innerText = '❌ اشعار بارگذاری نشد!';
        }
    </script>
</body>
</html>
