<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فال حافظ | Samisaki</title>
    <link href="https://fonts.googleapis.com/css2?family=Mirza:wght@400;600;700&family=Vazirmatn:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0c;
            --gold: #D4AF37;
            --gold-light: #FEF0C0;
            --card-bg: rgba(15, 15, 20, 0.9);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            font-family: 'Vazirmatn', 'Mirza', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            direction: rtl;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }
        .particles {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 0;
        }
        .particle {
            position: absolute; border-radius: 50%;
            background: var(--gold-light);
            box-shadow: 0 0 10px var(--gold), 0 0 20px var(--gold);
            animation: floatUp 8s infinite ease-in-out; opacity: 0.7;
        }
        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 0.7; }
            50% { opacity: 1; transform: translateY(-25px) scale(1.3); }
            100% { transform: translateY(0) scale(1); opacity: 0.7; }
        }
        .card {
            position: relative; z-index: 1;
            background: var(--card-bg); backdrop-filter: blur(20px);
            border: 1px solid rgba(212,175,55,0.4); border-radius: 36px;
            padding: 50px 30px 40px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.7), 0 0 40px rgba(212,175,55,0.3);
            text-align: center; max-width: 650px; width: 100%;
            display: flex; flex-direction: column; align-items: center; gap: 35px;
        }
        .title {
            font-family: 'Mirza', cursive;
            font-size: 2.8rem; color: var(--gold);
            text-shadow: 0 0 20px rgba(212,175,55,0.5); letter-spacing: 2px;
        }
        .btn {
            background: rgba(212,175,55,0.08); border: 2px solid var(--gold);
            color: var(--gold); font-family: 'Vazirmatn', sans-serif;
            font-size: 1.2rem; font-weight: 600; padding: 14px 35px;
            border-radius: 40px; cursor: pointer; transition: all 0.3s ease;
            backdrop-filter: blur(5px); display: flex; align-items: center; gap: 10px;
            text-decoration: none; margin: 10px 0; justify-content: center;
        }
        .btn:hover { background: var(--gold); color: #0a0a0c; box-shadow: 0 0 35px var(--gold); transform: translateY(-3px); }
        .btn:active { transform: scale(0.96); }
        .suggestion {
            font-size: 1.6rem; color: var(--gold-light); margin: 20px 0; min-height: 60px;
        }
        .poem-line {
            font-size: 1.5rem; font-weight: 400; line-height: 2.2;
            color: var(--gold-light); text-shadow: 0 0 8px rgba(212,175,55,0.3);
            white-space: pre-line;
        }
        .interpretation {
            font-size: 1.1rem; color: #ccc; line-height: 2;
            border-top: 1px solid rgba(212,175,55,0.4); padding-top: 20px; margin-top: 10px;
        }
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(10px);
            z-index: 100; display: none; justify-content: center; align-items: center;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: var(--card-bg); border: 1px solid var(--gold);
            border-radius: 24px; padding: 30px; max-width: 500px; width: 90%;
            max-height: 80vh; overflow-y: auto; color: var(--gold-light);
            text-align: center;
        }
        .modal-content h3 { color: var(--gold); margin-bottom: 20px; font-family: 'Mirza', cursive; }
        .history-item { border-bottom: 1px solid rgba(255,255,255,0.1); padding: 15px 0; }
        .close-btn { margin-top: 20px; }
    </style>
</head>
<body>
<div class="particles" id="particlesContainer"></div>

<div class="card" id="mainCard">
    <div class="title">📜 فال حافظ</div>
    <div id="step1">
        <button class="btn" id="newFalBtn">✨ فال جدید</button>
        <button class="btn" id="historyBtn">📋 فال‌های گذشته</button>
    </div>
    <div id="step2" style="display:none;">
        <div class="suggestion">فال خود را انتخاب کنید:</div>
        <button class="btn" id="romanticBtn">💖 عاشقانه</button>
        <button class="btn" id="dailyBtn">🌿 روزمره</button>
        <button class="btn" id="backBtn1">🔙 بازگشت</button>
    </div>
    <div id="step3" style="display:none;">
        <div class="suggestion" id="verseHint">... نیت کنید و ضربه بزنید</div>
        <button class="btn" id="revealBtn">✨ نیت کردم</button>
        <button class="btn" id="backBtn2">🔙 بازگشت</button>
    </div>
    <div id="step4" style="display:none;">
        <div class="poem-line" id="poemDisplay"></div>
        <div class="interpretation" id="meaningDisplay"></div>
        <button class="btn" id="newSearchBtn">🔄 فال دوباره</button>
        <button class="btn" id="homeBtn">🏠 خانه</button>
    </div>
</div>

<div class="modal" id="historyModal">
    <div class="modal-content">
        <h3>📜 فال‌های گذشته</h3>
        <div id="historyList"></div>
        <button class="btn close-btn" id="closeModalBtn">بستن</button>
    </div>
</div>

<script src="poems/poems.js"></script>
<script>
    let currentCategory = null;
    let history = JSON.parse(localStorage.getItem('falHistory')) || [];

    function showStep(step) {
        document.getElementById('step1').style.display = 'none';
        document.getElementById('step2').style.display = 'none';
        document.getElementById('step3').style.display = 'none';
        document.getElementById('step4').style.display = 'none';
        if (step === 1) document.getElementById('step1').style.display = 'block';
        else if (step === 2) document.getElementById('step2').style.display = 'block';
        else if (step === 3) document.getElementById('step3').style.display = 'block';
        else if (step === 4) document.getElementById('step4').style.display = 'block';
    }

    document.getElementById('newFalBtn').addEventListener('click', ()=> showStep(2));
    document.getElementById('backBtn1').addEventListener('click', ()=> showStep(1));
    document.getElementById('backBtn2').addEventListener('click', ()=> showStep(2));
    document.getElementById('homeBtn').addEventListener('click', ()=> showStep(1));
    document.getElementById('newSearchBtn').addEventListener('click', ()=> showStep(1));

    function getRandomPoem(category) {
        const filtered = poems.filter(p => p.category === category);
        return filtered[Math.floor(Math.random() * filtered.length)];
    }

    document.getElementById('romanticBtn').addEventListener('click', ()=>{
        currentCategory = 'romantic';
        const random = getRandomPoem('romantic');
        document.getElementById('verseHint').textContent = '✨ ' + random.verse.split('\n')[0] + '...';
        document.getElementById('verseHint').dataset.poem = random.verse;
        document.getElementById('verseHint').dataset.meaning = random.meaning;
        showStep(3);
    });
    document.getElementById('dailyBtn').addEventListener('click', ()=>{
        currentCategory = 'daily';
        const random = getRandomPoem('daily');
        document.getElementById('verseHint').textContent = '🌿 ' + random.verse.split('\n')[0] + '...';
        document.getElementById('verseHint').dataset.poem = random.verse;
        document.getElementById('verseHint').dataset.meaning = random.meaning;
        showStep(3);
    });

    document.getElementById('revealBtn').addEventListener('click', ()=>{
        const poem = document.getElementById('verseHint').dataset.poem;
        const meaning = document.getElementById('verseHint').dataset.meaning;
        document.getElementById('poemDisplay').textContent = poem;
        document.getElementById('meaningDisplay').textContent = meaning;
        history.push({ poem, meaning, category: currentCategory, date: new Date().toLocaleDateString('fa-IR') });
        localStorage.setItem('falHistory', JSON.stringify(history));
        showStep(4);
    });

    document.getElementById('historyBtn').addEventListener('click', ()=>{
        const list = document.getElementById('historyList');
        list.innerHTML = history.length === 0 ? '<p>هنوز فالی نگرفته‌اید.</p>' :
            history.map((item, idx) => `<div class="history-item"><strong>فال ${idx+1}:</strong> ${item.poem.split('\n')[0]}...<br><small>${item.date}</small></div>`).join('');
        document.getElementById('historyModal').classList.add('active');
    });
    document.getElementById('closeModalBtn').addEventListener('click', ()=>{
        document.getElementById('historyModal').classList.remove('active');
    });

    // ذرات طلایی
    const particlesContainer = document.getElementById('particlesContainer');
    for (let i = 0; i < 25; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        const size = Math.random() * 6 + 3;
        p.style.width = size + 'px'; p.style.height = size + 'px';
        p.style.top = Math.random() * 100 + '%'; p.style.left = Math.random() * 100 + '%';
        p.style.animationDelay = Math.random() * 8 + 's';
        particlesContainer.appendChild(p);
    }
    showStep(1);
</script>
</body>
</html>
